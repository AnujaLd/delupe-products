# Use Docker's embedded DNS so nginx can resolve service names to the right container IP.
# The `resolve` flag lets nginx re-resolve the name when the container's IP changes.
resolver 127.0.0.11 valid=5s;

# `zone` is required when using `resolve` so nginx can safely re-resolve the
# upstream name at runtime when container IPs change. 64k is enough for a small
# set of peers.
upstream php_upstream {
    zone php_upstream 64k;
    server delupe_app:9000 resolve;
}

server {
    listen 80;
    index index.php index.html;
    root /var/www/public;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }
}
