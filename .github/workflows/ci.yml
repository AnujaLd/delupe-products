name: CI Pipeline

on: [push, pull_request]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: delupe_db
          POSTGRES_USER: delupe_user
          POSTGRES_PASSWORD: delupe_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, mbstring, bcmath
          coverage: none

      - name: Install Composer dependencies
        working-directory: src
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy env file
        working-directory: src
        run: cp .env.example .env

      - name: Generate app key
        working-directory: src
        run: php artisan key:generate

      - name: Override DB settings
        working-directory: src
        run: |
          sed -i 's/DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/DB_DATABASE=.*/DB_DATABASE=delupe_db/' .env
          sed -i 's/DB_USERNAME=.*/DB_USERNAME=delupe_user/' .env
          sed -i 's/DB_PASSWORD=.*/DB_PASSWORD=delupe_pass/' .env

      - name: Add extra env vars
        working-directory: src
        run: |
          echo "API_KEY=my-secret-api-key-12345" >> .env
          echo "QUEUE_CONNECTION=sync" >> .env

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h 127.0.0.1 -p 5432 -U delupe_user; do
            echo "Waiting for postgres..."
            sleep 2
          done

      - name: Run migrations
        working-directory: src
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: delupe_db
          DB_USERNAME: delupe_user
          DB_PASSWORD: delupe_pass
        run: php artisan migrate --force

      - name: Run automated tests
        working-directory: src
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: delupe_db
          DB_USERNAME: delupe_user
          DB_PASSWORD: delupe_pass
          API_KEY: my-secret-api-key-12345
          QUEUE_CONNECTION: sync
        run: php artisan test

      - name: Install Larastan for PHPStan
        working-directory: src
        run: composer require --dev nunomaduro/larastan --no-interaction || true

      - name: Run PHPStan static analysis
        working-directory: src
        run: vendor/bin/phpstan analyse --configuration=phpstan.neon --no-progress || true